# ==========================================
# BASE APPLICATION CONFIGURATIONS
# ==========================================

spring.application.name=employee

# Local .env Config Import
spring.config.import=optional:file:.env[.properties]

# Active Profile Configuration
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server Listening Port
server.port=${SERVER_PORT:8080}

# Database Connection Settings
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:employee_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Security & JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:default-secret-key-which-is-very-long-and-secure-for-development-purposes}
app.jwt.access-expiration-ms=${APP_JWT_ACCESS_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-ms=${APP_JWT_REFRESH_EXPIRATION_MS:604800000}

# CORS Policy Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# AI Cognitive Engine (Spring AI using OpenAI proxy to Groq API)
spring.ai.openai.api-key=${GROQ_API_KEY:mock-key-for-testing}
spring.ai.openai.base-url=${GROQ_BASE_URL:https://api.groq.com/openai}
spring.ai.openai.chat.options.model=${GROQ_MODEL:llama-3.3-70b-versatile}