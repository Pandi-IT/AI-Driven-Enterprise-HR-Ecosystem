<div class="attendance-container animate-fade-in">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold mb-0 text-dark font-title"><i class="fas fa-calendar-check text-primary me-2"></i> Attendance Log Board</h3>
    <button class="btn btn-primary btn-sm px-3" (click)="openMarkModal()" [disabled]="employees.length === 0">
      <i class="fas fa-plus me-1"></i> Log Check-in
    </button>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">Fetching historical records...</p>
  </div>

  <!-- Board Table Layout -->
  <div *ngIf="!isLoading" class="premium-table-container shadow-sm">
    <div class="table-responsive">
      <table class="premium-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Employee Name</th>
            <th>Check-in Time</th>
            <th>Status</th>
            <th>Operational Notes</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="attendanceRecords.length === 0">
            <td colspan="5" class="text-center py-5 text-muted">No attendance logs found.</td>
          </tr>
          <tr *ngFor="let rec of attendanceRecords">
            <td class="fw-bold text-muted font-monospace">{{rec.date}}</td>
            <td class="fw-semibold text-dark">{{rec.employee.firstName}} {{rec.employee.lastName}}</td>
            <td class="font-monospace text-muted">{{rec.checkIn || '--:--'}}</td>
            <td>
              <span class="d-inline-flex align-items-center">
                <i class="fas fa-circle me-2 small" [ngClass]="{
                  'text-success': rec.status === 'Present',
                  'text-warning': rec.status === 'Late',
                  'text-danger': rec.status === 'Absent' || rec.status === 'Half-Day'
                }"></i>
                <span class="fw-semibold">{{rec.status}}</span>
              </span>
            </td>
            <td class="small text-muted font-body text-break">{{rec.notes || '-'}}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Log Check-in Modal Overlay -->
<div *ngIf="showMarkModal" class="modal-backdrop fade show"></div>
<div *ngIf="showMarkModal" class="modal fade show d-block" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header bg-light border-0 py-3 px-4">
        <h5 class="modal-title fw-bold font-title"><i class="fas fa-clock text-primary me-2"></i>Log Attendance Check-in</h5>
        <button type="button" class="btn-close" (click)="closeMarkModal()"></button>
      </div>
      <div class="modal-body p-4">
        <form (submit)="onSubmitAttendance()">
          <div class="mb-3">
            <label class="form-label fw-bold small text-muted">Employee Select</label>
            <select [(ngModel)]="attEmpId" name="employee" class="form-select" required>
              <option *ngFor="let e of employees" [value]="e.id">{{e.firstName}} {{e.lastName}}</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small text-muted">Log Date</label>
            <input type="date" [(ngModel)]="attDate" name="date" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small text-muted">Mark Status</label>
            <select [(ngModel)]="attStatus" name="status" class="form-select" required>
              <option value="Present">Present (On Time)</option>
              <option value="Late">Late (Grace Period Over)</option>
              <option value="Absent">Absent</option>
              <option value="Half-Day">Half-Day</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold small text-muted">Operational Notes</label>
            <input type="text" [(ngModel)]="attNotes" name="notes" class="form-control" placeholder="e.g. Traffic delays, medical check, doctor visit...">
          </div>

          <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-secondary w-50" (click)="closeMarkModal()">Cancel</button>
            <button type="submit" class="btn btn-primary w-50">Log Attendance</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
