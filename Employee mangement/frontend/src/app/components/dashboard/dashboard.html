<div class="dashboard-wrapper">
  <!-- Sidebar -->
  <aside class="dashboard-sidebar">
    <div class="sidebar-header">
      <i class="fas fa-layer-group text-primary me-2"></i> NexaCorp
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/dashboard/home" routerLinkActive="active" class="nav-item">
        <i class="fas fa-chart-line nav-icon"></i> Overview
      </a>
      <a routerLink="/dashboard/employees" routerLinkActive="active" class="nav-item">
        <i class="fas fa-user-friends nav-icon"></i> Employees
      </a>
      <a routerLink="/dashboard/attendance" routerLinkActive="active" class="nav-item">
        <i class="fas fa-calendar-check nav-icon"></i> Attendance
      </a>
      <a routerLink="/dashboard/leaves" routerLinkActive="active" class="nav-item">
        <i class="fas fa-plane-departure nav-icon"></i> Leave Requests
      </a>
      <a routerLink="/dashboard/recruitment" routerLinkActive="active" class="nav-item">
        <i class="fas fa-briefcase nav-icon"></i> Recruitment
      </a>
    </nav>
    <div class="sidebar-footer">
      <button (click)="logout()" class="btn btn-outline-danger btn-sm w-100">
        <i class="fas fa-sign-out-alt me-1"></i> Sign Out
      </button>
    </div>
  </aside>

  <!-- Main Content Container -->
  <div class="dashboard-main">
    <!-- Top Header -->
    <header class="dashboard-header bg-slate-900 text-white px-4 py-3 d-flex justify-content-between align-items-center">
      <div class="header-brand">
        <h4 class="mb-0 fw-bold font-title">NexaCorp Central <span class="badge bg-primary fs-7 ms-2">HR Suite</span></h4>
      </div>
      
      <!-- Mood Pulse Board -->
      <div class="d-flex align-items-center gap-3">
        <div class="mood-box d-flex align-items-center px-3 py-1.5 rounded-pill bg-slate-800" (click)="fetchMoodSummary()">
          <span class="fs-4 me-2">{{moodEmoji}}</span>
          <div class="text-start">
            <div class="small text-muted text-uppercase fw-bold" style="font-size: 0.65rem; letter-spacing: 0.5px;">Company Vibe</div>
            <span class="small fw-semibold" [ngClass]="moodClass">{{moodText}}</span>
          </div>
        </div>

        <button class="btn btn-primary btn-sm px-3 rounded-pill" (click)="openPulseModal()">
          <i class="fas fa-smile me-1"></i> Pulse Survey
        </button>
      </div>
    </header>

    <!-- Router View Outlet -->
    <main class="dashboard-content p-4">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Chatbot Floating Widget -->
  <div class="chatbot-widget" [ngClass]="{ 'chatbot-hidden': !isChatbotOpen }">
    <!-- Chat Header -->
    <div class="chatbot-header d-flex justify-content-between align-items-center" (click)="toggleChatbot()">
      <div class="d-flex align-items-center">
        <i class="fas fa-robot text-primary me-2 fs-5"></i>
        <div>
          <h6 class="mb-0 fw-bold font-title text-white">HR Copilot</h6>
          <small class="text-muted" style="font-size: 0.7rem;">Active (Llama 3.3 AI)</small>
        </div>
      </div>
      <button class="btn btn-link text-white p-0"><i class="fas" [ngClass]="isChatbotOpen ? 'fa-times' : 'fa-chevron-up'"></i></button>
    </div>

    <!-- Chat Messages -->
    <div class="chatbot-messages p-3" id="chatbot-messages" *ngIf="isChatbotOpen">
      <div *ngFor="let msg of chatMessages" class="chat-message" [ngClass]="msg.isBot ? 'bot-msg' : 'user-msg'">
        <div *ngIf="msg.isHtml" [innerHTML]="msg.text"></div>
        <div *ngIf="!msg.isHtml">{{msg.text}}</div>
      </div>
      <div *ngIf="isChatLoading" class="chat-message bot-msg text-muted">
        <span class="spinner-grow spinner-grow-sm me-1"></span> HR Copilot thinking...
      </div>
    </div>

    <!-- Chat Input -->
    <div class="chatbot-input p-2 border-top bg-white d-flex align-items-center" *ngIf="isChatbotOpen">
      <input type="text" [(ngModel)]="chatInput" (keyup.enter)="sendChatMessage()" placeholder="Ask anything about policies or employees..." class="form-control form-control-sm border-0 me-2" [disabled]="isChatLoading">
      <button class="btn btn-primary btn-sm px-3" (click)="sendChatMessage()" [disabled]="isChatLoading"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <!-- Floating Toggle Button (visible only when chat is closed) -->
  <button *ngIf="!isChatbotOpen" (click)="toggleChatbot()" class="chatbot-toggle-btn shadow-lg btn btn-primary rounded-circle">
    <i class="fas fa-comments fs-4"></i>
  </button>
</div>

<!-- Pulse Survey Custom Modal overlay -->
<div *ngIf="showPulseModal" class="modal-backdrop fade show"></div>
<div *ngIf="showPulseModal" class="modal fade show d-block" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg border-0 rounded-4">
      <div class="modal-header bg-light border-0 py-3 px-4">
        <h5 class="modal-title fw-bold"><i class="fas fa-poll-h text-primary me-2"></i>Submit Pulse Survey</h5>
        <button type="button" class="btn-close" (click)="closePulseModal()"></button>
      </div>
      <div class="modal-body p-4">
        <form (submit)="onSubmitPulse()">
          <div class="mb-4 text-center">
            <label class="form-label fw-bold d-block mb-3 text-muted">How are you feeling today?</label>
            <div class="d-flex justify-content-center gap-3">
              <label class="rating-label">
                <input type="radio" name="rating" [(ngModel)]="pulseRating" [value]="1" class="visually-hidden">
                <span class="rating-emoji" [ngClass]="{selected: pulseRating === 1}">😟</span>
              </label>
              <label class="rating-label">
                <input type="radio" name="rating" [(ngModel)]="pulseRating" [value]="2" class="visually-hidden">
                <span class="rating-emoji" [ngClass]="{selected: pulseRating === 2}">😐</span>
              </label>
              <label class="rating-label">
                <input type="radio" name="rating" [(ngModel)]="pulseRating" [value]="3" class="visually-hidden">
                <span class="rating-emoji" [ngClass]="{selected: pulseRating === 3}">😊</span>
              </label>
              <label class="rating-label">
                <input type="radio" name="rating" [(ngModel)]="pulseRating" [value]="4" class="visually-hidden">
                <span class="rating-emoji" [ngClass]="{selected: pulseRating === 4}">😁</span>
              </label>
              <label class="rating-label">
                <input type="radio" name="rating" [(ngModel)]="pulseRating" [value]="5" class="visually-hidden">
                <span class="rating-emoji" [ngClass]="{selected: pulseRating === 5}">🤩</span>
              </label>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold small text-muted">Anonymous Comment</label>
            <textarea [(ngModel)]="pulseComment" name="comment" class="form-control" rows="3" placeholder="Tell us how we can improve our company culture..." required></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-secondary w-50" (click)="closePulseModal()">Cancel</button>
            <button type="submit" class="btn btn-primary w-50">Submit Feedback</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
